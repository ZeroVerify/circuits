name: trusted_setup

on:
  workflow_dispatch:
    inputs:
      beacon_hash:
        description: 'Public randomness beacon (64 hex chars, no 0x prefix) — e.g. an Ethereum block hash'
        required: true
      circuit:
        description: 'Circuit to run trusted setup for'
        required: true
        type: choice
        options:
          - student_status
          - credential_revocation

jobs:
  trusted-setup:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    env:
      AWS_REGION: us-east-1
      S3_BUCKET: zeroverify-artifacts
      BEACON_HASH: ${{ inputs.beacon_hash }}
      CIRCUITS: ${{ inputs.circuit }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install circom
        run: |
          curl -fL https://github.com/iden3/circom/releases/download/v2.2.3/circom-linux-amd64 -o /usr/local/bin/circom
          chmod +x /usr/local/bin/circom

      - name: Install snarkjs
        run: npm install -g snarkjs

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::043189681060:role/ZeroVerifyGitHubActionsArtifactUpload
          aws-region: us-east-1

      - name: Generate test inputs
        run: node scripts/generate_test_inputs.js

      - name: Run trusted setup
        env:
          CIRCOMLIB_PATH: ${{ github.workspace }}/node_modules/circomlib/circuits
        run: bash scripts/trusted_setup.sh

      - name: Create release for this artifact version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="trusted-setup-${GITHUB_SHA}"
          gh release create "$TAG" \
            --title "Trusted setup ${GITHUB_SHA}" \
            --notes "Trusted setup artifacts for commit ${GITHUB_SHA}"
