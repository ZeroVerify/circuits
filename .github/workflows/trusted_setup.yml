name: trusted_setup

on:
  workflow_dispatch:

jobs:
  trusted-setup:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
      BEACON_HASH: ${{ secrets.BEACON_HASH }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install -g snarkjs
          npm install circomlib

      - name: Install circom
        run: |
          sudo apt-get update
          sudo apt-get install -y cargo
          cargo install circom

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Run trusted setup
        env:
          CIRCOMLIB_PATH: ${{ github.workspace }}/node_modules/circomlib/circuits
        run: bash scripts/trusted_setup.sh

      - name: Create release for this artifact version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="trusted-setup-${GITHUB_SHA}"
          gh release create "$TAG" \
            --title "Trusted setup ${GITHUB_SHA}" \
            --notes "Trusted setup artifacts for commit ${GITHUB_SHA}"
